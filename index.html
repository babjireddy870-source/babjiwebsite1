<!DOCTYPE html>
<html>
<head>
    <title>Babji Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px 20px;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid white;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            max-width: 600px;
            margin: auto;
        }

        .skills {
            margin-top: 40px;
        }

        .skills span {
            display: inline-block;
            background: white;
            color: #333;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            font-size: 16px;
        }

        .btn {
            margin-top: 30px;
            background: #25D366;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            color: white;
        }

        .btn:hover {
            background: #1ebe5d;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 14px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="https://via.placeholder.com/150" alt="My Photo">

        <h1>Hello, I'm Babji 👋</h1>

        <p>

        </p>

        <div class="skills">

            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>GitHub</span>
        </div>

        <a href="https://wa.me/919876543210" target="_blank">
            <button class="btn">Chat on WhatsApp</button>
        </a>

    </div>

    <footer>
        © 2026 Babji | All Rights Reserved
    </footer>

</body>
</html>
