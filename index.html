<!DOCTYPE html>
<html>
<head>
    <title>Babji Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px 20px;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid white;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
            max-width: 600px;
            margin: auto;
        }

        .skills {
            margin-top: 40px;
        }

        .skills span {
            display: inline-block;
            background: white;
            color: #333;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            font-size: 16px;
        }

        button {
            margin-top: 30px;
            background: #ff9800;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="My Photo">

        <h1>Hello, I'm Babji 👋</h1>

        <p>
            I am learning Web Development. I love building websites 
            and improving my technical skills every day.
        </p>

        <div class="skills">
            <h2>My Skills</h2>
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>GitHub</span>
        </div>

        <button onclick="contact()">Contact Me</button>
    </div>

    <script>
        function contact() {
            alert("You can contact me soon! 😊");
        }
    </script>

</body>
</html>
